<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Claude coral background -->
  <circle cx="128" cy="128" r="128" fill="#CC785C"/>
  <!-- 6-arm asterisk: three lines at 0°, 60°, 120° -->
  <g stroke="#FAEEE5" stroke-width="22" stroke-linecap="round">
    <line x1="128" y1="28" x2="128" y2="228"/>
    <line x1="128" y1="28" x2="128" y2="228" transform="rotate(60 128 128)"/>
    <line x1="128" y1="28" x2="128" y2="228" transform="rotate(120 128 128)"/>
  </g>
  <!-- Filled circle behind $ for legibility -->
  <circle cx="128" cy="128" r="52" fill="#CC785C"/>
  <!-- Dollar sign -->
  <text x="128" y="128"
        text-anchor="middle" dominant-baseline="central"
        font-family="Arial, Helvetica, sans-serif"
        font-size="72" font-weight="900"
        fill="#FAEEE5">$</text>
</svg>
