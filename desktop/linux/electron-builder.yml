appId: com.giacecco.ddbya-desktop
productName: ddbya Desktop

directories:
  output: linux/dist

files:
  - "**/*"
  - "!macos/**"
  - "!windows/**"
  - "!linux/**"
  - "!node_modules/.cache/**"

extraResources:
  - from: "../proxy-core.js"
    to: "proxy-core.js"
  - from: "../report-core.js"
    to: "report-core.js"

linux:
  category: Development
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
  icon: assets/icon.png
